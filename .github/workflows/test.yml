name: Tests

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "webview/**"
      - "*.json"
      - "*.ts"
      - ".github/workflows/test.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "webview/**"
      - "*.json"
      - "*.ts"
      - ".github/workflows/test.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  extension-tests:
    name: Extension Tests (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install system dependencies for keytar (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev

      - name: Install dependencies
        run: npm install --ignore-engines

      - name: Compile tests
        run: npm run compile-tests

      - name: Run extension tests
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            xvfb-run -a npm test
          else
            npm test
          fi
        shell: bash

      - name: Generate coverage report (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: xvfb-run -a npm run test:coverage
        shell: bash

      - name: Upload extension coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          flags: extension
          name: extension-tests
          fail_ci_if_error: false

  webview-tests:
    name: Webview Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install system dependencies for keytar
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev

      - name: Install dependencies
        run: npm install --ignore-engines

      - name: Run webview tests with coverage
        run: npx vitest run --coverage

      - name: Upload webview coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage-webview/lcov.info
          flags: webview
          name: webview-tests
          fail_ci_if_error: false
